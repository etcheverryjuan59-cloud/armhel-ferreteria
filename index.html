<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Ferretería industrial en Montevideo. Herramientas, taladros, amoladoras y más. Envíos a todo Uruguay.">
<title>ARMHEL Ferretería Industrial | Montevideo, Uruguay</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* VARIABLES */
:root {
  --amarillo: #FFD700;
  --negro: #1a1a1a;
  --blanco: #ffffff;
  --gris-oscuro: #333333;
  --gris-medio: #666666;
  --gris-claro: #f4f4f4;
  --borde: #e0e0e0;
  --azul-mp: #009ee3;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Manrope', sans-serif; background-color: var(--blanco); color: var(--negro); overflow-x: hidden; }

/* HEADER */
header { 
  background: var(--negro); 
  color: white; 
  padding: 15px 5%; 
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
  position: sticky; 
  top: 0; 
  z-index: 1000; 
}
.logo h1 { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.8rem; letter-spacing: 1px; }

.cart-trigger { cursor: pointer; position: relative; font-size: 1.4rem; }
.cart-count { 
  position: absolute; top: -8px; right: -10px; 
  background: var(--amarillo); color: var(--negro); 
  font-size: 0.75rem; width: 20px; height: 20px; 
  border-radius: 50%; display: flex; align-items: center; 
  justify-content: center; font-weight: 800; 
}

/* SECCIÓN CONTADORES (Estadísticas) */
.stats-container {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  padding: 40px 5%;
  background: var(--negro);
  color: white;
  text-align: center;
}
.stat-item h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 2.5rem; font-weight: 800; color: var(--amarillo); }
.stat-item p { text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; opacity: 0.8; }

/* PANEL DE CARRITO */
.cart-panel {
  position: fixed; right: -100%; top: 0; 
  width: 100%; max-width: 400px; height: 100vh;
  background: var(--blanco); z-index: 3000;
  box-shadow: -5px 0 25px rgba(0,0,0,0.2);
  display: flex; flex-direction: column;
  transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.cart-panel.show { right: 0; }

.cart-header {
  padding: 20px; background: var(--negro); color: white;
  display: flex; justify-content: space-between; align-items: center;
}
.cart-header h2 { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; text-transform: uppercase; margin: 0; }
.close-cart { background: none; border: none; color: white; font-size: 2rem; cursor: pointer; }

.cart-body { flex: 1; overflow-y: auto; padding: 20px; }
.cart-item { display: flex; gap: 15px; padding: 15px 0; border-bottom: 1px solid var(--borde); align-items: center; }
.cart-item img { width: 60px; height: 60px; object-fit: contain; background: #eee; border-radius: 4px; }
.cart-item-info { flex: 1; }
.cart-item-info h4 { font-size: 0.85rem; text-transform: uppercase; font-weight: 700; margin-bottom: 4px; }
.cart-item-price { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.1rem; }

/* FOOTER CARRITO (ESTILO IMAGEN) */
.cart-footer { background: var(--gris-claro); padding: 25px; border-top: 1px solid var(--borde); }
.total-line { display: flex; justify-content: space-between; margin-bottom: 10px; font-family: 'Barlow', sans-serif; }
.main-total { 
  margin-top: 15px; padding-top: 15px; border-top: 2px solid var(--borde);
  font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.8rem; text-transform: uppercase;
}
.btn-comprar-ahora {
  width: 100%; background: var(--azul-mp); color: white; border: none; padding: 18px;
  font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.2rem;
  text-transform: uppercase; border-radius: 4px; cursor: pointer; margin-top: 20px;
}

.overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 2500; }
.overlay.show { display: block; }
</style>
</head>
<body>

<header>
  <div class="logo"><h1>ARMHEL</h1></div>
  <div class="cart-trigger" onclick="toggleCart()">
    🛒 <span class="cart-count" id="cart-count">0</span>
  </div>
</header>

<section class="stats-container">
  <div class="stat-item">
    <h3 id="count-productos">0</h3>
    <p>Productos</p>
  </div>
  <div class="stat-item">
    <h3 id="count-ventas">0</h3>
    <p>Ventas Realizadas</p>
  </div>
  <div class="stat-item">
    <h3 id="count-clientes">0</h3>
    <p>Clientes Felices</p>
  </div>
</section>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>
<div class="cart-panel" id="cart-panel">
  <div class="cart-header">
    <h2>TU CARRITO</h2>
    <button class="close-cart" onclick="toggleCart()">&times;</button>
  </div>
  <div class="cart-body" id="cart-items-container"></div>
  <div class="cart-footer">
    <div class="total-line"><span>Subtotal</span><span id="cart-subtotal">$ 0</span></div>
    <div class="total-line"><span>Envío</span><span style="color:green; font-weight:bold;">GRATIS</span></div>
    <div class="total-line main-total"><span>Total</span><span id="cart-total">$ 0</span></div>
    <button class="btn-comprar-ahora" onclick="pagarMercadoPago()">Pagar con Mercado Pago</button>
  </div>
</div>

<script>
// Datos base
const productosCatalogo = [
    { id: 1, nombre: "Taladro Percutor", precio: 4500, imagen: "https://via.placeholder.com/100" },
    { id: 2, nombre: "Amoladora Angular", precio: 3200, imagen: "https://via.placeholder.com/100" },
    // Agrega aquí el resto de tus productos...
];

let carrito = JSON.parse(localStorage.getItem('carrito_armhel')) || [];

// FUNCIÓN DE ANIMACIÓN DE NÚMEROS (Para que no cargue de golpe)
function animarContador(id, fin, duracion = 1500) {
    const obj = document.getElementById(id);
    let inicio = 0;
    let paso = Math.ceil(fin / (duracion / 16));
    
    const temporizador = setInterval(() => {
        inicio += paso;
        if (inicio >= fin) {
            obj.textContent = fin + "+";
            clearInterval(temporizador);
        } else {
            obj.textContent = inicio;
        }
    }, 16);
}

// INICIALIZACIÓN
window.addEventListener('DOMContentLoaded', () => {
    // 1. Iniciamos contadores fijos rápido
    animarContador("count-ventas", 1250);
    animarContador("count-clientes", 980);
    
    // 2. Cargamos el número de productos del array inmediatamente
    const totalProds = productosCatalogo.length;
    animarContador("count-productos", totalProds);

    actualizarCarritoUI();
});

function toggleCart() {
    document.getElementById('cart-panel').classList.toggle('show');
    document.getElementById('overlay').classList.toggle('show');
}

function actualizarCarritoUI() {
    const container = document.getElementById('cart-items-container');
    const totalLabel = document.getElementById('cart-total');
    const subtotalLabel = document.getElementById('cart-subtotal');
    const countLabel = document.getElementById('cart-count');
    
    container.innerHTML = '';
    let total = 0;
    let itemsQty = 0;

    carrito.forEach((p, i) => {
        total += p.precio * p.qty;
        itemsQty += p.qty;
        container.innerHTML += `
            <div class="cart-item">
                <img src="${p.imagen}" alt="${p.nombre}">
                <div class="cart-item-info">
                    <h4>${p.nombre}</h4>
                    <p class="cart-item-price">${p.qty} x $${p.precio.toLocaleString()}</p>
                </div>
                <button onclick="eliminar(${i})" style="border:none; background:none; cursor:pointer;">✕</button>
            </div>
        `;
    });

    countLabel.textContent = itemsQty;
    subtotalLabel.textContent = `$ ${total.toLocaleString()}`;
    totalLabel.textContent = `$ ${total.toLocaleString()}`;
    localStorage.setItem('carrito_armhel', JSON.stringify(carrito));
}

function eliminar(i) {
    carrito.splice(i, 1);
    actualizarCarritoUI();
}
</script>
</body>
</html>
